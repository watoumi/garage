# Reverse proxy: a single public entrypoint in front of the SPA and the API.
#
#   /        -> Next.js frontend  (frontend:3000)
#   /api/    -> FastAPI backend   (backend:8000)  [/api prefix stripped]
#   /uploads -> car images served by the backend
#
# HTTPS-ready: terminate TLS here by enabling the 443 server block below and
# mounting certs into /etc/nginx/certs (e.g. from certbot or a cloud LB).

upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_upstream {
    server backend:8000;
}

# --- Optional HTTP -> HTTPS redirect (enable in production) ---
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;

    # Security headers (defense in depth; the API also sets its own).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 30m;  # allow car photo uploads

    # API — strip the /api prefix before forwarding.
    location /api/ {
        proxy_pass http://backend_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploaded images (served by the backend).
    location /uploads/ {
        proxy_pass http://backend_upstream/uploads/;
        proxy_set_header Host $host;
    }

    # Everything else — the Next.js app.
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# --- HTTPS (uncomment and provide certs to enable) ---
# server {
#     listen 443 ssl;
#     server_name your-domain.com;
#     ssl_certificate     /etc/nginx/certs/fullchain.pem;
#     ssl_certificate_key /etc/nginx/certs/privkey.pem;
#     # ... same location blocks as above ...
# }
