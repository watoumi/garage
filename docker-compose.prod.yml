# Production overlay — Nginx as the single entrypoint, secrets from .env,
# and production-safe application settings.
#
#   cp .env.example .env   # then fill in real secrets
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Public traffic enters on :80 (and :443 once TLS certs are mounted). The
# backend boots with ENVIRONMENT=production, which makes the API refuse to
# start with default secrets or wildcard CORS (assert_production_safe()).

services:
  backend:
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg2://garage:${POSTGRES_PASSWORD}@db:5432/garage
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      AUTO_APPROVE_GARAGES: "false"   # require manual admin verification in prod
      SEED_ON_START: "false"

  db:
    environment:
      POSTGRES_USER: garage
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: garage

  nginx:
    image: nginx:1.27-alpine
    container_name: garage-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    volumes:
      - ./ops/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ops/nginx/certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
